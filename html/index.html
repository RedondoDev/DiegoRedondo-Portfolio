    <meta

videoclips. Edición profesional para marcas, artistas y creadores."

          preload="metadata"
          fetchpriority="high"

      <section class="carousel-section">
        <div class="carousel-container">
          <div class="swiper">
            <div class="swiper-wrapper">
              <!-- CAMBIO: Carrusel gif cambiar el src
               Para cambiar el título cambias title y la 
               descripción description (cada swiper-slide es uno).
               ¡OJO! Cuando lo cambies, al hacer clic se 
               sigue viendo el vídeo anterior. Para cambiarlo vas
               al archivo scripts/video.js y lo cambias por 
               el vídeo correspondiente en videoEmbedCodes. -->

                src="/resources/gifs/1.mp4"
                poster="/resources/gifs/poster1.webp"
                section="video1"
                title="Aliexpress"
                description="Este es el vídeo 1"
              ></swiper-slide>
              <swiper-slide
                src="/resources/gifs/2.mp4"
                poster="/resources/gifs/poster2.webp"
                section="video2"
                title="Vetusta Morla"
                description="Este es el vídeo 2"

              <swiper-slide

                poster="/resources/gifs/poster3.webp"
                section="video3"
                title="Óliver"
                description="Este es el vídeo 3"

              <swiper-slide

                poster="/resources/gifs/poster4.webp"

                poster="/resources/gifs/poster5.webp"
